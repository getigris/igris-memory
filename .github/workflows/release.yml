name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache vcpkg OpenSSL (Windows)
        if: runner.os == 'Windows'
        id: vcpkg-cache
        uses: actions/cache@v5
        with:
          path: C:/vcpkg/installed
          key: vcpkg-openssl-x64-windows-static-md-v1

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: vcpkg install openssl:x64-windows-static-md

      - name: Set OpenSSL env (Windows)
        if: runner.os == 'Windows'
        run: echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static-md" >> $env:GITHUB_ENV

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../igris-memory-${{ matrix.target }}.tar.gz igmem
        shell: bash

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../igris-memory-${{ matrix.target }}.zip igmem.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: igris-memory-${{ matrix.target }}
          path: igris-memory-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/igris-memory-*.tar.gz
            artifacts/igris-memory-*.zip
            artifacts/checksums-sha256.txt

  homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Wait for release assets
        run: sleep 10

      - name: Download checksums
        run: |
          gh release download ${{ github.ref_name }} \
            --pattern 'checksums-sha256.txt' \
            --dir ./release-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          SHA_MACOS_ARM=$(grep 'aarch64-apple-darwin' ./release-assets/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_X64=$(grep 'x86_64-unknown-linux-gnu' ./release-assets/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_ARM=$(grep 'aarch64-unknown-linux-gnu' ./release-assets/checksums-sha256.txt | awk '{print $1}')

          sed -e "s/\${VERSION}/$VERSION/g" \
              -e "s/\${SHA256_MACOS_ARM}/$SHA_MACOS_ARM/g" \
              -e "s/\${SHA256_LINUX_X64}/$SHA_LINUX_X64/g" \
              -e "s/\${SHA256_LINUX_ARM}/$SHA_LINUX_ARM/g" \
              dist/igris-memory.rb > ./igris-memory.rb

          cat ./igris-memory.rb

      - name: Push to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.TAP_GITHUB_TOKEN }}
        with:
          source_file: igris-memory.rb
          destination_repo: getigris/homebrew-tap
          destination_folder: Formula
          destination_branch: main
          user_email: ci@it.getigris.com
          user_name: getigris-bot
          commit_message: "Update igris-memory to ${{ github.ref_name }}"
