name: Update Homebrew Formula

on:
  release:
    types: [published]


jobs:
  update-formula:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download checksums
        run: |
          gh release download ${{ github.event.release.tag_name }} \
            --pattern 'checksums-sha256.txt' \
            --dir /tmp/release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate formula
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          SHA_MACOS_ARM=$(grep 'aarch64-apple-darwin' /tmp/release/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_X64=$(grep 'x86_64-unknown-linux-gnu' /tmp/release/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_ARM=$(grep 'aarch64-unknown-linux-gnu' /tmp/release/checksums-sha256.txt | awk '{print $1}')

          sed -e "s/\${VERSION}/$VERSION/g" \
              -e "s/\${SHA256_MACOS_ARM}/$SHA_MACOS_ARM/g" \
              -e "s/\${SHA256_LINUX_X64}/$SHA_LINUX_X64/g" \
              -e "s/\${SHA256_LINUX_ARM}/$SHA_LINUX_ARM/g" \
              dist/igris-memory.rb > /tmp/igris-memory.rb

          cat /tmp/igris-memory.rb

      - name: Push to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.TAP_GITHUB_TOKEN }}
        with:
          source_file: /tmp/igris-memory.rb
          destination_repo: getigris/homebrew-tap
          destination_folder: Formula
          destination_branch: main
          user_email: ci@getigris.dev
          user_name: getigris-bot
          commit_message: "Update igris-memory to ${{ github.event.release.tag_name }}"
